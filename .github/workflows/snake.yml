name: Generate snake animation

on:
  schedule: # Ejecuta cada 12 horas
    - cron: "0 */12 * * *"
  
  workflow_dispatch: # Permite ejecutarlo manualmente

  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Genera la animación de la serpiente
      - name: generate snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Despliega los archivos generados a la rama snake-output de forma segura
      - name: push snake.svg to the output branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: snake-output # Tu rama de salida
          target-folder: .
          git-config-name: "github-actions[bot]"
          git-config-email: "41898282+github-actions[bot]@users.noreply.github.com"
          commit-message: "Update snake animation"
          clean: true
